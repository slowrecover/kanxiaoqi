<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>砍小器</title>
<style>
:root{
  --bg:#E9EDEA; --surface:#FFFFFF; --surface-soft:#F4F6F3;
  --ink:#2B3A35; --muted:#8B9A92; --line:#DCE3DF;
  --accent:#4F9277; --accent-press:#447F68; --accent-soft:#E2EFE8;
  --radius:18px;
  --font:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Noto Sans SC","Segoe UI",sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  background:var(--bg);color:var(--ink);font-family:var(--font);
  -webkit-font-smoothing:antialiased;line-height:1.6;
  display:flex;align-items:center;justify-content:center;padding:24px;
}
.wrap{width:100%;max-width:460px}
.card{
  background:var(--surface);border:1px solid var(--line);
  border-radius:var(--radius);padding:32px 28px;
  box-shadow:0 14px 40px -24px rgba(43,58,53,.5);
}
.eyebrow{display:flex;align-items:center;gap:10px;margin-bottom:22px;flex-wrap:wrap}
.dot{width:9px;height:9px;border-radius:50%;background:var(--accent)}
.eyebrow b{font-size:.95rem;letter-spacing:.02em}
.eyebrow span{color:var(--muted);font-size:.76rem}
.prompt{font-size:1.06rem;font-weight:600;margin:0 0 4px}
.hint{color:var(--muted);font-size:.82rem;margin:0 0 16px}
textarea,input[type=text]{
  width:100%;font-family:inherit;font-size:1rem;color:var(--ink);
  background:var(--surface-soft);border:1px solid var(--line);
  border-radius:12px;padding:14px;resize:none;line-height:1.55;
  transition:border-color .15s,background .15s;
}
textarea{min-height:96px}
textarea:focus,input:focus{outline:none;border-color:var(--accent);background:#fff}
.btn{
  margin-top:18px;width:100%;border:none;cursor:pointer;font-family:inherit;
  font-size:1rem;font-weight:600;color:#fff;background:var(--accent);
  padding:14px;border-radius:12px;transition:background .15s,transform .05s;
}
.btn:hover{background:var(--accent-press)}
.btn:active{transform:translateY(1px)}
.btn:disabled{background:#C2CFC9;cursor:not-allowed}
.btn.ghost{background:none;color:var(--muted);font-weight:500;margin-top:10px;padding:8px}
.btn.ghost:hover{background:var(--surface-soft);color:var(--ink)}
.parked{
  display:flex;gap:10px;align-items:flex-start;background:var(--surface-soft);
  border:1px dashed var(--line);border-radius:12px;padding:11px 13px;
  margin-bottom:20px;font-size:.85rem;color:var(--muted);
}
.parked .lbl{color:var(--accent);white-space:nowrap;font-weight:600}
.step{font-size:clamp(1.5rem,6vw,2.1rem);font-weight:700;line-height:1.4;margin:6px 0 18px}
.do-line{color:var(--muted);font-size:.9rem;margin:0 0 4px}
.win .check{
  width:46px;height:46px;border-radius:50%;background:var(--accent-soft);
  color:var(--accent);display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;margin-bottom:16px;
}
.win h2{margin:0 0 6px;font-size:1.3rem}
.win p{color:var(--muted);margin:0 0 4px}
.count{font-size:.8rem;color:var(--accent);font-weight:600;margin-top:14px}
.stage{display:none;animation:rise .35s ease both}
[data-stage="1"] .s1{display:block}
[data-stage="2"] .s2{display:block}
[data-stage="3"] .s3{display:block}
[data-stage="4"] .s4{display:block}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.stage{animation:none}}
.foot{text-align:center;color:var(--muted);font-size:.72rem;margin-top:18px}
</style>
</head>
<body>
<div class="wrap">
  <div class="card" id="card" data-stage="1">
    <div class="eyebrow"><span class="dot"></span><b>砍小器</b><span>把大到动不了的事,砍成现在能做的一步</span></div>

    <div class="stage s1">
      <p class="prompt">你急着想做、又动不了的那件事,是什么?</p>
      <p class="hint">先别想怎么做完,只把它写下来。</p>
      <textarea id="bigThing" placeholder="例如:开始做我的自媒体……"></textarea>
      <button class="btn" id="toStep" disabled>砍小它</button>
    </div>

    <div class="stage s2">
      <div class="parked"><span class="lbl">先放下</span><span id="parked2"></span></div>
      <p class="prompt">十分钟能做的最小一步,是什么?</p>
      <p class="hint">小到不可能失败,小到懒得拦你。</p>
      <input type="text" id="smallStep" placeholder="例如:写下我想帮的人是谁">
      <button class="btn" id="toDo" disabled>就这一步</button>
      <button class="btn ghost" id="back1">← 换一件事</button>
    </div>

    <div class="stage s3">
      <p class="do-line">现在,只做这一步——</p>
      <p class="step" id="stepText"></p>
      <p class="hint">带着怕、带着累,照做就行。不为结果,只为开始。</p>
      <button class="btn" id="done">我做了 ✓</button>
      <button class="btn ghost" id="back2">← 再砍小一点</button>
    </div>

    <div class="stage s4 win">
      <div class="check">✓</div>
      <h2 id="winTitle">小胜 +1</h2>
      <p id="winLine">够了。这一步,就是今天的种树。</p>
      <p class="count" id="count"></p>
      <button class="btn" id="again">再砍一件</button>
      <button class="btn ghost" id="rest">歇会儿</button>
    </div>

    <p class="foot">带着负担,照样做那件小事。</p>
  </div>
</div>

<script>
  const card=document.getElementById('card');
  const big=document.getElementById('bigThing');
  const step=document.getElementById('smallStep');
  const toStep=document.getElementById('toStep');
  const toDo=document.getElementById('toDo');
  let wins=0;
  const go=n=>card.dataset.stage=n;

  big.addEventListener('input',()=>toStep.disabled=!big.value.trim());
  step.addEventListener('input',()=>toDo.disabled=!step.value.trim());

  toStep.onclick=()=>{document.getElementById('parked2').textContent=big.value.trim();go(2);setTimeout(()=>step.focus(),60);};
  document.getElementById('back1').onclick=()=>{go(1);big.focus();};
  toDo.onclick=()=>{document.getElementById('stepText').textContent=step.value.trim();go(3);};
  document.getElementById('back2').onclick=()=>{go(2);step.focus();};
  document.getElementById('done').onclick=()=>{
    wins++;
    document.getElementById('winTitle').textContent='小胜 +1';
    document.getElementById('count').textContent='这次坐下来,你已经赢了 '+wins+' 手。';
    const lines=['够了。这一步,就是今天的种树。','你刚刚让一件事,真的发生了。','一手打对了——引擎松开,车动了一下。','怕还在,但你照做了。这,就是赢。'];
    document.getElementById('winLine').textContent=lines[Math.min(wins-1,lines.length-1)];
    go(4);
  };
  document.getElementById('again').onclick=()=>{big.value='';step.value='';toStep.disabled=true;toDo.disabled=true;go(1);big.focus();};
  document.getElementById('rest').onclick=()=>{
    document.getElementById('winTitle').textContent='去歇着吧';
    document.getElementById('winLine').textContent='你今天已经动了。剩下的,交给明天那一步。';
  };
</script>
</body>
</html>
